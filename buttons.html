<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Registration - KKDAT</title>
    
    <link rel="icon" type="image/png" href="CURRIMAO.PNG">
    
    <meta name="theme-color" content="#0f172a">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        
        /* Matching the Blue Hub Aesthetic */
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e40af 50%, #60a5fa 100%);
            background-attachment: fixed;
        }

        .glass-panel { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Glassy Logo Style for UI Elements */
        .logo-glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .input-field { transition: all 0.3s ease; border: 1px solid #e2e8f0; font-size: 16px; }
        .input-field:focus { 
            transform: translateY(-2px); 
            border-color: #3b82f6; 
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.2); 
            outline: none; 
        }

        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen py-12 px-4">

    <nav class="fixed top-0 left-0 right-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2 sm:gap-3">
                <div class="w-10 h-10 sm:w-11 sm:h-11 logo-glass rounded-full flex items-center justify-center overflow-hidden p-1">
                    <img src="CURRIMAO.PNG" alt="Logo" class="w-full h-full object-cover rounded-full">
                </div>
                <span class="text-white font-bold text-sm sm:text-lg tracking-tight truncate">KKDAT II Currimao</span>
            </div>
            <div class="flex gap-2 sm:gap-4">
                <a href="REGFORM.html" class="text-white bg-white/10 px-3 py-2 rounded-lg text-xs sm:text-sm font-medium hover:bg-white/20 transition-all border border-white/10">Register</a>
                <a href="SOCIAL HUB.html" target="_blank" class="text-white/70 hover:text-white px-3 py-2 rounded-lg text-xs sm:text-sm font-medium transition-colors">Socmed Hub</a>
            </div>
        </div>
    </nav>

    <div class="relative max-w-5xl mx-auto pt-16 sm:pt-24">
        <div class="text-center mb-10 fade-in px-2">
            <div class="w-20 h-20 sm:w-24 sm:h-24 logo-glass rounded-full mx-auto mb-6 p-1.5 overflow-hidden">
                <img src="CURRIMAO.PNG" alt="Logo" class="w-full h-full object-cover rounded-full">
            </div>
            
            <h1 class="text-3xl sm:text-4xl font-extrabold text-white mb-2 drop-shadow-lg">KKDAT Registration</h1>
            <p class="text-blue-100 text-sm sm:text-base font-medium opacity-90">Data is synchronized with the official KKDAT database</p>
        </div>

        <div class="glass-panel rounded-3xl shadow-2xl p-6 sm:p-10 fade-in">
            </div>
    </div>
</body>
</html>
