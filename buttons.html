<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKDAT Member Registry - Full View</title>
    <link rel="icon" type="image/png" href="CURRIMAO.PNG">
    <script>
        const ACCESS_PASSWORD = "Admin123";
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxZkFJL-fsBU8jLkAtLC0NP6dGiXLPWOJ9L6qFz3GnOGvrYN53iAES_PCrLw7Xy2BdN/exec";
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/1NFPsNXgObQUxNmPQkmzl_OSJGVwFvSF7pVlZxp1ASoQ/edit?usp=sharing";

        function checkAccess() {
            if (sessionStorage.getItem('isAuthorized') !== 'true') {
                const entry = prompt("Please enter the Admin Password:");
                if (entry === ACCESS_PASSWORD) {
                    sessionStorage.setItem('isAuthorized', 'true');
                } else {
                    alert("Unauthorized access.");
                    window.location.href = "REGFORM.html";
                }
            }
        }
        checkAccess();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .table-container::-webkit-scrollbar { height: 6px; }
        .table-container::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
        
        @media print {
            nav, .no-print, .del-col, .view-col { display: none !important; }
            body { background: white !important; }
            .modal-content { border: 1px solid #e2e8f0; box-shadow: none !important; margin: 0 auto; }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-900 to-slate-900 pb-12">

    <nav class="fixed top-0 left-0 right-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-white/10 no-print">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2 sm:gap-3">
                <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-xl bg-white flex items-center justify-center shadow-lg overflow-hidden">
                    <img src="CURRIMAO.PNG" alt="Logo" class="w-full h-full object-cover">
                </div>
                <div class="flex flex-col">
                    <span class="text-white font-bold text-sm sm:text-lg">KKDAT II Currimao</span>
                    <span id="liveStatus" class="text-[8px] text-emerald-400 font-bold uppercase tracking-widest animate-pulse">● Live Syncing</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="fetchData()" class="text-indigo-300 hover:text-white text-xs font-medium px-2">Refresh</button>
                <a href="REGFORM.html" class="bg-indigo-600 text-white px-4 py-1.5 rounded-lg text-xs font-medium">Add</a>
            </div>
        </div>
    </nav>

    <div class="relative max-w-[98%] mx-auto pt-24 px-2 sm:px-4">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-4 px-2">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold text-white uppercase tracking-tight">Member Database</h1>
                <p class="text-indigo-200 text-xs sm:text-sm">Manage records and generate Member IDs</p>
            </div>
            
            <div class="flex items-center gap-3 w-full md:w-auto no-print">
                <div class="bg-white/10 border border-white/20 rounded-xl px-4 py-2 flex flex-col justify-center min-w-[100px]">
                    <span class="text-[10px] text-indigo-300 uppercase font-bold">Total Members</span>
                    <span id="memberCount" class="text-white text-lg font-bold">0</span>
                </div>
                <input type="text" id="searchInput" placeholder="Search members..." 
                    class="px-4 py-3 rounded-xl w-full md:w-80 outline-none border-none shadow-xl text-sm" onkeyup="filterTable()">
            </div>
        </div>

        <div class="glass-panel rounded-2xl shadow-2xl overflow-hidden border border-white/10">
            <div class="overflow-x-auto table-container">
                <table class="w-full text-left border-collapse min-w-[1000px]">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-[10px] font-bold text-slate-500 uppercase">
                            <th class="px-4 py-4">Name & Sex</th>
                            <th class="px-4 py-4">Birth & Age</th>
                            <th class="px-4 py-4">Contact</th>
                            <th class="px-4 py-4">Address</th>
                            <th class="px-4 py-4">Social Media</th>
                            <th class="px-4 py-4 text-center view-col">ID Card</th>
                            <th class="px-4 py-4 text-center del-col">Del</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100 bg-white">
                        <tr><td colspan="7" class="px-6 py-20 text-center animate-pulse">Fetching records from KKDAT...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="idModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="relative bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl overflow-hidden modal-content border border-slate-100">
            <div class="bg-indigo-600 p-6 text-white text-center">
                <div class="flex justify-center mb-2">
                    <img src="CURRIMAO.PNG" class="w-16 h-16 bg-white rounded-2xl p-1 shadow-lg">
                </div>
                <h2 class="font-bold text-xl uppercase tracking-tight">KKDAT CURRIMAO</h2>
                <p class="text-[9px] opacity-70 uppercase tracking-[0.2em] font-bold">Official Digital ID</p>
            </div>

            <div id="idDetails" class="p-8 space-y-4">
                </div>

            <div class="bg-slate-50 p-6 flex justify-center gap-3 no-print">
                <button onclick="window.print()" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-xs font-bold uppercase tracking-wider shadow-lg">Print ID</button>
                <button onclick="closeModal()" class="bg-white border border-slate-200 text-slate-600 px-5 py-2.5 rounded-xl text-xs font-bold uppercase tracking-wider">Close</button>
            </div>
        </div>
    </div>

    <script>
        let allMembers = [];
        let isDeleting = false;

        function formatFBLink(input) {
            if (!input || input === '---' || input === 'No FB') return null;
            let cleanInput = input.trim();
            if (cleanInput.startsWith('http')) return cleanInput;
            return `https://facebook.com/${cleanInput.replace('@', '')}`;
        }

        async function fetchData() {
            if (isDeleting) return;
            try {
                const response = await fetch(SCRIPT_URL);
                allMembers = await response.json();
                if (!document.getElementById('searchInput').value) renderTable(allMembers);
            } catch (error) { console.error("Fetch Error:", error); }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            document.getElementById('memberCount').innerText = data ? data.length : 0;
            tbody.innerHTML = '';
            
            data.forEach((m, index) => {
                const fbUrl = formatFBLink(m.facebook);
                const fbDisplay = fbUrl ? 
                    `<a href="${fbUrl}" target="_blank" class="text-blue-600 font-bold hover:underline">View FB</a>` : 
                    '<span class="text-slate-300 italic text-[10px]">None</span>';

                tbody.insertAdjacentHTML('beforeend', `
                    <tr class="hover:bg-slate-50 transition-colors text-xs sm:text-sm">
                        <td class="px-4 py-4">
                            <div class="font-bold text-slate-800 uppercase">${m.fullName || '---'}</div>
                            <div class="text-[9px] text-slate-400 font-bold">${m.sex || '---'}</div>
                        </td>
                        <td class="px-4 py-4">
                            <div class="text-slate-600">${m.birthDate || '---'}</div>
                            <span class="text-[9px] font-black text-indigo-500">${m.age || '0'} YRS</span>
                        </td>
                        <td class="px-4 py-4">
                            <div class="text-slate-700 font-medium">${m.mobileNumber || '---'}</div>
                        </td>
                        <td class="px-4 py-4">
                            <div class="max-w-[150px] truncate text-slate-500 uppercase text-[10px]">${m.address || '---'}</div>
                        </td>
                        <td class="px-4 py-4">${fbDisplay}</td>
                        <td class="px-4 py-4 text-center view-col">
                            <button onclick="showMemberID(${index})" class="bg-indigo-50 text-indigo-600 p-2 rounded-lg hover:bg-indigo-600 hover:text-white transition-all">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-width="2"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-width="2"/></svg>
                            </button>
                        </td>
                        <td class="px-4 py-4 text-center del-col">
                            <button onclick="deleteMember(${m.rowId})" class="text-slate-300 hover:text-red-500 p-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2"></path></svg></button>
                        </td>
                    </tr>`);
            });
        }

        function showMemberID(index) {
            const m = allMembers[index];
            const qrData = encodeURIComponent(`KKDAT-ID:${m.fullName}:${m.rowId}`);
            const qrUrl = `https://chart.googleapis.com/chart?chs=150x150&cht=qr&chl=${qrData}&choe=UTF-8`;

            document.getElementById('idDetails').innerHTML = `
                <div class="text-center">
                    <h3 class="text-2xl font-black text-slate-900 uppercase leading-tight mb-1">${m.fullName}</h3>
                    <p class="text-indigo-600 font-bold text-[10px] tracking-widest uppercase mb-4">${m.sex} • ${m.civilStatus || 'SINGLE'}</p>
                </div>
                
                <div class="flex justify-center mb-4">
                    <div class="p-2 bg-white border border-slate-100 rounded-2xl shadow-sm">
                        <img src="${qrUrl}" alt="QR Code" class="w-28 h-28">
                    </div>
                </div>

                <div class="space-y-3">
                    <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-center">
                        <p class="text-[8px] text-slate-400 font-bold uppercase mb-0.5">Address</p>
                        <p class="text-slate-700 font-bold text-[10px] uppercase">${m.address || '---'}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-center">
                            <p class="text-[8px] text-slate-400 font-bold uppercase">Birth Date</p>
                            <p class="text-slate-800 font-bold text-[10px]">${m.birthDate || '---'}</p>
                        </div>
                        <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-center">
                            <p class="text-[8px] text-slate-400 font-bold uppercase">Contact</p>
                            <p class="text-slate-800 font-bold text-[10px]">${m.mobileNumber || '---'}</p>
                        </div>
                    </div>
                </div>

                <div class="text-center pt-3 border-t border-slate-100">
                    <p class="text-[8px] text-slate-400 font-bold uppercase">Emergency Contact</p>
                    <p class="text-indigo-900 font-black text-[11px] uppercase">${m.contactPerson || '---'}</p>
                </div>
            `;
            document.getElementById('idModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('idModal').classList.add('hidden'); }
        
        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allMembers.filter(m => 
                (m.fullName && m.fullName.toLowerCase().includes(query)) || 
                (m.address && m.address.toLowerCase().includes(query))
            );
            renderTable(filtered);
        }

        async function deleteMember(rowId) {
            if (!confirm("Delete permanently?")) return;
            isDeleting = true;
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete', rowId: rowId }) });
                setTimeout(() => { isDeleting = false; fetchData(); }, 1500);
            } catch (error) { isDeleting = false; }
        }

        fetchData();
        setInterval(fetchData, 10000);
    </script>
</body>
</html>
