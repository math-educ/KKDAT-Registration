<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Registration - KKDAT</title>
    <link rel="icon" type="image/png" href="CURRIMAO.PNG">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e40af 50%, #60a5fa 100%);
            background-attachment: fixed;
        }

        .glass-panel { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .input-field { transition: all 0.3s ease; border: 1px solid #e2e8f0; font-size: 16px; }
        .input-field:focus { 
            transform: translateY(-2px); 
            border-color: #3b82f6; 
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.2); 
            outline: none; 
        }

        /* Passcode Overlay */
        #passcodeOverlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fade-in { animation: fadeIn 0.5s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen py-12 px-4">

    <div id="passcodeOverlay">
        <div class="glass-panel p-8 rounded-3xl shadow-2xl w-full max-w-md text-center mx-4 fade-in">
            <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">Secure Access</h2>
            <p class="text-slate-500 mb-6 text-sm">Enter the authorized passcode to proceed.</p>
            
            <input type="password" id="passcodeInput" 
                class="input-field w-full px-4 py-3 rounded-xl mb-4 text-center tracking-widest font-bold text-xl" 
                placeholder="••••••••">
            
            <button onclick="verifyPasscode()" 
                class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg">
                Verify Identity
            </button>
            <p id="passcodeError" class="text-red-500 text-xs mt-3 hidden">Incorrect passcode. Please check with your lead.</p>
        </div>
    </div>

    <div id="mainContent" class="opacity-0 pointer-events-none transition-opacity duration-700">
        <nav class="fixed top-0 left-0 right-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-white/10">
            <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center border border-white/20 overflow-hidden p-1">
                        <img src="CURRIMAO.PNG" alt="Logo" class="w-full h-full object-cover rounded-full">
                    </div>
                    <span class="text-white font-bold text-sm sm:text-lg tracking-tight">KKDAT II Currimao</span>
                </div>
                <div class="flex gap-2">
                    <a href="SOCIAL HUB.html" target="_blank" class="text-white/70 hover:text-white px-3 py-2 text-xs sm:text-sm font-medium transition-colors">Socmed Hub</a>
                </div>
            </div>
        </nav>

        <div class="relative max-w-5xl mx-auto pt-16 sm:pt-24">
            <div class="text-center mb-10 px-2">
                <div class="w-20 h-20 bg-white/10 backdrop-blur-md rounded-full mx-auto mb-6 p-1.5 shadow-2xl border border-white/20 overflow-hidden">
                    <img src="CURRIMAO.PNG" alt="Logo" class="w-full h-full object-cover rounded-full">
                </div>
                <h1 class="text-3xl sm:text-4xl font-bold text-white mb-2">KKDAT Registration</h1>
                <p class="text-indigo-200 text-sm sm:text-base">Official Member Database Entry</p>
            </div>

            <div class="glass-panel rounded-3xl shadow-2xl p-6 sm:p-10">
                <form id="registrationForm" class="space-y-6 sm:space-y-8">
                    
                    <div class="bg-slate-50/50 rounded-2xl p-4 sm:p-6 border border-slate-100">
                        <h2 class="text-lg sm:text-xl font-semibold text-slate-800 mb-6 flex items-center">
                            <span class="w-7 h-7 rounded-lg bg-indigo-600 text-white flex items-center justify-center mr-3 text-xs">1</span>
                            Personal Information
                        </h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
                            <div class="md:col-span-2">
                                <label class="block text-sm font-medium text-slate-700 mb-2">Full Name *</label>
                                <input type="text" id="fullName" required class="input-field w-full px-4 py-3 rounded-xl" placeholder="First Name, M.I., Last Name">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Sex *</label>
                                <select id="sex" required class="input-field w-full px-4 py-3 rounded-xl bg-white">
                                    <option value="">Select sex</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Birthday *</label>
                                <input type="date" id="birthDate" required class="input-field w-full px-4 py-3 rounded-xl">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Age</label>
                                <input type="number" id="age" readonly class="input-field w-full px-4 py-3 rounded-xl bg-slate-100 font-bold text-indigo-600">
                            </div>
                        </div>
                    </div>

                    <div class="bg-slate-50/50 rounded-2xl p-4 sm:p-6 border border-slate-100">
                        <h2 class="text-lg sm:text-xl font-semibold text-slate-800 mb-6 flex items-center">
                            <span class="w-7 h-7 rounded-lg bg-purple-600 text-white flex items-center justify-center mr-3 text-xs">2</span>
                            Contact & Address
                        </h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
                            <div class="md:col-span-2">
                                <label class="block text-sm font-medium text-slate-700 mb-2">Complete Address *</label>
                                <textarea id="address" required rows="2" class="input-field w-full px-4 py-3 rounded-xl" placeholder="Poblacion, Currimao, Ilocos Norte"></textarea>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Mobile Number *</label>
                                <input type="tel" id="mobileNumber" required class="input-field w-full px-4 py-3 rounded-xl" placeholder="09xxxxxxxxx">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Facebook Profile Link</label>
                                <input type="text" id="facebook" class="input-field w-full px-4 py-3 rounded-xl" placeholder="facebook.com/username">
                            </div>
                        </div>
                    </div>

                    <div class="bg-slate-50/50 rounded-2xl p-4 sm:p-6 border border-slate-100">
                        <h2 class="text-lg sm:text-xl font-semibold text-slate-800 mb-4 flex items-center">
                            <span class="w-7 h-7 rounded-lg bg-emerald-600 text-white flex items-center justify-center mr-3 text-xs">3</span>
                            Data Privacy
                        </h2>
                        <div class="flex items-start gap-3">
                            <input type="checkbox" id="privacyConsent" required class="mt-1 w-5 h-5 rounded border-slate-300 text-indigo-600 cursor-pointer">
                            <label for="privacyConsent" class="text-sm text-slate-700 cursor-pointer select-none">
                                I authorize KKDAT II Currimao to process my data for official membership purposes in compliance with the Data Privacy Act of 2012.
                            </label>
                        </div>
                    </div>

                    <div class="flex flex-col sm:flex-row justify-end gap-3 pt-4">
                        <button type="reset" class="w-full sm:w-auto px-8 py-4 bg-slate-200 text-slate-700 rounded-2xl font-bold hover:bg-slate-300 transition-all">Clear</button>
                        <button type="submit" id="submitBtn" class="w-full sm:w-auto px-10 py-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-2xl font-bold hover:shadow-lg transition-all">Register Member</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // 1. DYNAMIC PASSCODE LOGIC (MMDDYYYY)
        function getTodayPasscode() {
            const now = new Date();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const yyyy = now.getFullYear();
            return mm + dd + yyyy;
        }

        function verifyPasscode() {
            const input = document.getElementById('passcodeInput').value;
            const errorMsg = document.getElementById('passcodeError');
            const overlay = document.getElementById('passcodeOverlay');
            const content = document.getElementById('mainContent');
            
            if (input === getTodayPasscode()) {
                overlay.classList.add('opacity-0');
                setTimeout(() => {
                    overlay.style.display = 'none';
                    content.classList.remove('opacity-0', 'pointer-events-none');
                }, 500);
            } else {
                errorMsg.classList.remove('hidden');
                document.getElementById('passcodeInput').classList.add('border-red-500');
                document.getElementById('passcodeInput').value = "";
            }
        }

        document.getElementById('passcodeInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') verifyPasscode(); });

        // 2. REGISTRATION & AGE CALCULATION LOGIC
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbymx5klDjX_yTn59_VVzE1nOA8dEHUlFPfQD3FfJDR1ZRp62k0Wx-_2Ph-4zLTYCho5/exec";

        document.getElementById('birthDate').addEventListener('change', (e) => {
            const birthDate = new Date(e.target.value);
            const today = new Date();
            if (isNaN(birthDate.getTime())) return;
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--;
            document.getElementById('age').value = age >= 0 ? age : 0;
        });

        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Processing...";
            
            const data = {
                fullName: document.getElementById('fullName').value,
                sex: document.getElementById('sex').value,
                birthDate: document.getElementById('birthDate').value,
                age: document.getElementById('age').value,
                address: document.getElementById('address').value,
                mobileNumber: document.getElementById('mobileNumber').value,
                facebook: document.getElementById('facebook').value,
                dateRegistered: new Date().toLocaleString()
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                body: JSON.stringify(data)
            })
            .then(() => {
                alert('Success! Registration completed.');
                // REDIRECT TO SOCIAL HUB
                window.location.href = "SOCIAL HUB.html";
            })
            .catch(() => {
                alert('Registration failed. Please try again.');
                btn.disabled = false;
                btn.innerText = "Register Member";
            });
        });
    </script>
</body>
</html>
