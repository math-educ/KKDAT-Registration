<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKDAT Member Registry - Full View</title>
    <link rel="icon" type="image/png" href="CURRIMAO.PNG">
    <script>
        const ACCESS_PASSWORD = "Admin123";
        // PASTE YOUR NEW DEPLOYMENT URL HERE:
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyXUP8T2tS_gK-sPDmnbjzid3hBXEuwrixoQygG8HXv91d1-QP58372a0hAXFG6uN8/exec";
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/1NFPsNXgObQUxNmPQkmzl_OSJGVwFvSF7pVlZxp1ASoQ/edit?usp=sharing";

        function checkAccess() {
            if (sessionStorage.getItem('isAuthorized') !== 'true') {
                const entry = prompt("Please enter the Admin Password:");
                if (entry === ACCESS_PASSWORD) {
                    sessionStorage.setItem('isAuthorized', 'true');
                } else {
                    alert("Unauthorized access.");
                    window.location.href = "REGFORM.html";
                }
            }
        }
        checkAccess();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .table-container::-webkit-scrollbar { height: 6px; }
        .table-container::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
        @media print {
            nav, .no-print, .del-col { display: none !important; }
            body { background: white; color: black; }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-900 to-slate-900 pb-12">

    <nav class="fixed top-0 left-0 right-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-white/10 no-print">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2 sm:gap-3">
                <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-xl bg-white flex items-center justify-center shadow-lg overflow-hidden">
                    <img src="CURRIMAO.PNG" alt="Logo" class="w-full h-full object-cover">
                </div>
                <div class="flex flex-col">
                    <span class="text-white font-bold text-sm sm:text-lg truncate">KKDAT II Currimao</span>
                    <span id="liveStatus" class="text-[8px] text-emerald-400 font-bold uppercase tracking-widest animate-pulse">● Live Syncing</span>
                </div>
            </div>
            <div class="flex gap-2 sm:gap-4">
                <button onclick="fetchData()" class="text-indigo-300 hover:text-white text-xs font-medium transition-colors">Refresh</button>
                <a href="REGFORM.html" class="bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-xs font-medium">Add New</a>
            </div>
        </div>
    </nav>

    <div class="relative max-w-[98%] mx-auto pt-24 px-2 sm:px-4">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-4 px-2">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold text-white uppercase tracking-tight">Member Database</h1>
                <p class="text-indigo-200 text-xs sm:text-sm">Official Records • KKDAT II Currimao</p>
            </div>
            <div class="flex items-center gap-3 w-full md:w-auto no-print">
                <div class="bg-white/10 border border-white/20 rounded-xl px-4 py-2 flex flex-col justify-center min-w-[100px]">
                    <span class="text-[10px] text-indigo-300 uppercase font-bold">Total</span>
                    <span id="memberCount" class="text-white text-lg font-bold">0</span>
                </div>
                <input type="text" id="searchInput" placeholder="Search members..." 
                    class="rounded-xl w-full md:w-64 px-4 py-2 outline-none text-sm" onkeyup="filterTable()">
            </div>
        </div>

        <div class="glass-panel rounded-2xl shadow-2xl overflow-hidden border border-white/10">
            <div class="overflow-x-auto table-container">
                <table class="w-full text-left border-collapse min-w-[1000px]">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200">
                            <th class="px-4 py-4 text-[10px] font-bold text-slate-500 uppercase">Registration Date</th>
                            <th class="px-4 py-4 text-[10px] font-bold text-slate-500 uppercase">Name & Sex</th>
                            <th class="px-4 py-4 text-[10px] font-bold text-slate-500 uppercase">Birth & Age</th>
                            <th class="px-4 py-4 text-[10px] font-bold text-slate-500 uppercase">Contact Info</th>
                            <th class="px-4 py-4 text-[10px] font-bold text-slate-500 uppercase">Address</th>
                            <th class="px-4 py-4 text-[10px] font-bold text-slate-500 uppercase">Social Media</th>
                            <th class="px-4 py-4 text-[10px] font-bold text-slate-500 uppercase text-center del-col">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100 bg-white">
                        <tr>
                            <td colspan="7" class="px-6 py-20 text-center text-slate-500 animate-pulse">Connecting to Database...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let allMembers = [];
        let isDeleting = false;

        function formatSafeDate(val) {
            if (!val || val === '---') return '---';
            const date = new Date(val);
            return !isNaN(date.getTime()) ? 
                date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : val;
        }

        async function fetchData() {
            if (isDeleting) return;
            try {
                const response = await fetch(SCRIPT_URL);
                allMembers = await response.json();
                renderTable(allMembers);
            } catch (error) { console.error("Fetch Error:", error); }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            document.getElementById('memberCount').innerText = data.length;
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-20 text-center text-slate-400">No records found.</td></tr>';
                return;
            }

            data.forEach(m => {
                const fbUrl = (m.facebook && m.facebook !== '---') ? (m.facebook.startsWith('http') ? m.facebook : `https://facebook.com/${m.facebook}`) : null;
                
                const row = `
                    <tr class="hover:bg-slate-50 transition-colors text-xs">
                        <td class="px-4 py-4 text-indigo-600 font-bold uppercase">
                            ${formatSafeDate(m.registrationDate)}
                        </td>
                        <td class="px-4 py-4">
                            <div class="font-bold text-slate-800 uppercase">${m.fullName || '---'}</div>
                            <div class="text-[9px] text-slate-400 uppercase font-bold">${m.sex || '---'} | ${m.civilStatus || '---'}</div>
                        </td>
                        <td class="px-4 py-4">
                            <div class="text-slate-600">${formatSafeDate(m.birthDate)}</div>
                            <span class="text-[9px] font-bold px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded-full">${m.age || '0'} YRS</span>
                        </td>
                        <td class="px-4 py-4">
                            <div class="text-slate-800 font-medium">${m.mobileNumber || '---'}</div>
                            <div class="text-slate-400 text-[10px]">${m.email || ''}</div>
                        </td>
                        <td class="px-4 py-4 uppercase text-slate-600 max-w-[150px] truncate">${m.address || '---'}</td>
                        <td class="px-4 py-4">
                            ${fbUrl ? `<a href="${fbUrl}" target="_blank" class="text-blue-600 font-bold hover:underline">View FB</a>` : '<span class="text-slate-300">N/A</span>'}
                        </td>
                        <td class="px-4 py-4 text-center del-col">
                            <button onclick="deleteMember(${m.rowId})" class="text-slate-300 hover:text-red-500 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                            </button>
                        </td>
                    </tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allMembers.filter(m => (m.fullName || '').toLowerCase().includes(query));
            renderTable(filtered);
        }

        async function deleteMember(rowId) {
            if (!confirm("Delete member?")) return;
            isDeleting = true;
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete', rowId: rowId }) });
                setTimeout(() => { isDeleting = false; fetchData(); }, 2000);
            } catch (e) { isDeleting = false; fetchData(); }
        }

        fetchData();
        setInterval(fetchData, 10000); // Auto-refresh every 10 seconds
    </script>
</body>
</html>
