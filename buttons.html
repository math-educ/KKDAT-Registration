<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKDAT Member Registry - Full View</title>
    <link rel="icon" type="image/png" href="CURRIMAO.PNG">
    <script>
        const ACCESS_PASSWORD = "Admin123";
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxZkFJL-fsBU8jLkAtLC0NP6dGiXLPWOJ9L6qFz3GnOGvrYN53iAES_PCrLw7Xy2BdN/exec";
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/1NFPsNXgObQUxNmPQkmzl_OSJGVwFvSF7pVlZxp1ASoQ/edit?usp=sharing";

        function checkAccess() {
            if (sessionStorage.getItem('isAuthorized') !== 'true') {
                const entry = prompt("Please enter the Admin Password:");
                if (entry === ACCESS_PASSWORD) {
                    sessionStorage.setItem('isAuthorized', 'true');
                } else {
                    alert("Unauthorized access.");
                    window.location.href = "REGFORM.html";
                }
            }
        }
        checkAccess();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .table-container::-webkit-scrollbar { height: 6px; }
        .table-container::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
        
        /* Modal Animation */
        .modal-overlay { transition: opacity 0.3s ease; }
        .modal-content { transition: transform 0.3s ease; }

        @media print {
            nav, .no-print, .del-col, .view-col { display: none !important; }
            body { background: white; color: black; }
            .print-area { display: block !important; }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-900 to-slate-900 pb-12">

    <nav class="fixed top-0 left-0 right-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-white/10 no-print">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2 sm:gap-3">
                <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-xl bg-white flex items-center justify-center shadow-lg overflow-hidden">
                    <img src="CURRIMAO.PNG" alt="Logo" class="w-full h-full object-cover">
                </div>
                <div class="flex flex-col">
                    <span class="text-white font-bold text-sm sm:text-lg">KKDAT II Currimao</span>
                    <span id="liveStatus" class="text-[8px] text-emerald-400 font-bold uppercase tracking-widest animate-pulse">● Live Syncing</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="fetchData()" class="text-indigo-300 hover:text-white text-xs font-medium px-2">Refresh</button>
                <a href="REGFORM.html" class="bg-indigo-600 text-white px-4 py-1.5 rounded-lg text-xs font-medium">Add New</a>
            </div>
        </div>
    </nav>

    <div class="relative max-w-[98%] mx-auto pt-24 px-2 sm:px-4">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-4">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold text-white uppercase tracking-tight">Member Database</h1>
                <p class="text-indigo-200 text-xs sm:text-sm">Click the eye icon to view full Member ID Card</p>
            </div>
            
            <div class="flex items-center gap-3 w-full md:w-auto no-print">
                <div class="bg-white/10 border border-white/20 rounded-xl px-4 py-2 flex flex-col justify-center min-w-[100px]">
                    <span class="text-[10px] text-indigo-300 uppercase font-bold">Total Members</span>
                    <span id="memberCount" class="text-white text-lg font-bold">0</span>
                </div>
                <input type="text" id="searchInput" placeholder="Search name or address..." 
                    class="px-4 py-2 rounded-xl w-full md:w-80 outline-none border-none shadow-xl text-sm" onkeyup="filterTable()">
            </div>
        </div>

        <div class="glass-panel rounded-2xl shadow-2xl overflow-hidden border border-white/10">
            <div class="overflow-x-auto table-container">
                <table class="w-full text-left border-collapse min-w-[900px]">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-[10px] font-bold text-slate-500 uppercase">
                            <th class="px-4 py-4">Name & Sex</th>
                            <th class="px-4 py-4">Birth & Age</th>
                            <th class="px-4 py-4">Contact Info</th>
                            <th class="px-4 py-4">Address</th>
                            <th class="px-4 py-4 text-center view-col">View</th>
                            <th class="px-4 py-4 text-center del-col">Del</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100 bg-white">
                        <tr><td colspan="6" class="px-6 py-20 text-center animate-pulse">Loading database...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="idModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="relative bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden modal-content">
            <div class="bg-indigo-600 p-6 text-white flex justify-between items-start">
                <div class="flex items-center gap-3">
                    <img src="CURRIMAO.PNG" class="w-12 h-12 bg-white rounded-lg p-1">
                    <div>
                        <h2 class="font-bold text-lg leading-tight">KKDAT CURRIMAO</h2>
                        <p class="text-[10px] opacity-80 uppercase tracking-widest">Official Member ID</p>
                    </div>
                </div>
                <button onclick="closeModal()" class="text-white/50 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2"></path></svg>
                </button>
            </div>

            <div id="idDetails" class="p-6 space-y-4">
                </div>

            <div class="bg-slate-50 p-4 flex justify-center gap-4 no-print">
                <button onclick="window.print()" class="bg-slate-800 text-white px-6 py-2 rounded-xl text-xs font-bold uppercase tracking-widest">Print ID</button>
                <button onclick="closeModal()" class="border border-slate-200 px-6 py-2 rounded-xl text-xs font-bold uppercase tracking-widest">Close</button>
            </div>
        </div>
    </div>

    <script>
        let allMembers = [];
        let isDeleting = false;

        async function fetchData() {
            if (isDeleting) return;
            try {
                const response = await fetch(SCRIPT_URL);
                allMembers = await response.json();
                const query = document.getElementById('searchInput').value;
                if (!query) renderTable(allMembers);
            } catch (error) {
                console.error("Fetch Error:", error);
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            document.getElementById('memberCount').innerText = data ? data.length : 0;
            tbody.innerHTML = '';
            
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-20 text-center text-slate-400">No records found.</td></tr>';
                return;
            }

            data.forEach((m, index) => {
                const row = `
                    <tr class="hover:bg-slate-50 transition-colors text-xs sm:text-sm border-b border-slate-100">
                        <td class="px-4 py-4">
                            <div class="font-bold text-slate-800 uppercase">${m.fullName || '---'}</div>
                            <div class="text-[9px] text-slate-400 uppercase font-bold">${m.sex || '---'}</div>
                        </td>
                        <td class="px-4 py-4">
                            <div class="text-slate-600 text-[11px]">${m.birthDate || '---'}</div>
                            <span class="text-[9px] font-bold text-indigo-700">${m.age || '0'} YRS</span>
                        </td>
                        <td class="px-4 py-4">
                            <div class="text-slate-800 font-medium text-[11px]">${m.mobileNumber || '---'}</div>
                            <div class="text-slate-500 text-[10px] truncate max-w-[120px]">${m.email || '---'}</div>
                        </td>
                        <td class="px-4 py-4">
                            <div class="max-w-[180px] text-slate-600 text-[11px] truncate uppercase">${m.address || '---'}</div>
                        </td>
                        <td class="px-4 py-4 text-center view-col">
                            <button onclick="showMemberID(${index})" class="text-indigo-600 hover:bg-indigo-50 p-2 rounded-full transition-all">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-width="2"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-width="2"/></svg>
                            </button>
                        </td>
                        <td class="px-4 py-4 text-center del-col">
                            <button onclick="deleteMember(${m.rowId})" class="text-slate-300 hover:text-red-500 p-2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2"></path></svg>
                            </button>
                        </td>
                    </tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }

        function showMemberID(index) {
            const m = allMembers[index];
            const detailsHtml = `
                <div class="text-center mb-6">
                    <div class="w-24 h-24 bg-slate-100 rounded-2xl mx-auto mb-3 flex items-center justify-center border-2 border-indigo-100">
                        <svg class="w-12 h-12 text-slate-300" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"></path></svg>
                    </div>
                    <h3 class="text-xl font-bold text-slate-900 uppercase">${m.fullName}</h3>
                    <p class="text-indigo-600 font-semibold text-xs tracking-widest uppercase">${m.sex} • ${m.civilStatus || 'SINGLE'}</p>
                </div>
                
                <div class="grid grid-cols-2 gap-4 text-[11px]">
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <p class="text-slate-400 font-bold uppercase mb-1">Birth Date</p>
                        <p class="text-slate-700 font-semibold">${m.birthDate || '---'}</p>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <p class="text-slate-400 font-bold uppercase mb-1">Age</p>
                        <p class="text-slate-700 font-semibold">${m.age} Years Old</p>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 col-span-2">
                        <p class="text-slate-400 font-bold uppercase mb-1">Contact Details</p>
                        <p class="text-slate-700 font-semibold">${m.mobileNumber || 'No Phone'}</p>
                        <p class="text-slate-500">${m.email || 'No Email'}</p>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 col-span-2">
                        <p class="text-slate-400 font-bold uppercase mb-1">Address</p>
                        <p class="text-slate-700 font-semibold uppercase">${m.address || '---'}</p>
                    </div>
                    <div class="bg-indigo-50 p-3 rounded-xl border border-indigo-100 col-span-2">
                        <p class="text-indigo-400 font-bold uppercase mb-1">Emergency Contact</p>
                        <p class="text-indigo-900 font-bold">${m.contactPerson || '---'}</p>
                    </div>
                </div>
            `;
            document.getElementById('idDetails').innerHTML = detailsHtml;
            document.getElementById('idModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('idModal').classList.add('hidden');
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allMembers.filter(m => 
                (m.fullName && m.fullName.toLowerCase().includes(query)) || 
                (m.address && m.address.toLowerCase().includes(query))
            );
            renderTable(filtered);
        }

        async function deleteMember(rowId) {
            if (!confirm("Delete permanently?")) return;
            isDeleting = true;
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'delete', rowId: rowId })
                });
                setTimeout(() => { isDeleting = false; fetchData(); }, 1500);
            } catch (error) { isDeleting = false; }
        }

        fetchData();
        setInterval(fetchData, 10000);
    </script>
</body>
</html>
