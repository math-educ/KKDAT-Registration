<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKDAT II Currimao - Social Hub</title>
    
    <link rel="icon" type="image/png" href="CURRIMAO.PNG">
    
    <meta name="theme-color" content="#0f172a">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e40af 50%, #60a5fa 100%);
            background-attachment: fixed;
            overflow-x: hidden;
            position: relative;
        }

        /* BLUE Animated Blurred Background Graphics */
        .bg-blur-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            animation: move 15s infinite alternate;
        }

        .blob-1 { background: #00ffff; top: -10%; left: -10%; }
        .blob-2 { background: #1d4ed8; bottom: -10%; right: -10%; animation-delay: -3s; }
        .blob-3 { background: #a78bfa; top: 30%; left: 20%; animation-delay: -7s; opacity: 0.15; }
        .blob-4 { background: #ffffff; bottom: 20%; left: 50%; animation-delay: -10s; opacity: 0.1; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1) rotate(0deg); }
            to { transform: translate(150px, 80px) scale(1.2) rotate(10deg); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        /* ACCURATE CIRCULAR PROGRESS GRAPH */
        .progress-circle-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .progress-ring__circle {
            transition: stroke-dashoffset 0.8s ease-out;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
            stroke-dasharray: 251.2; 
        }

        /* Carousel 3D Effects */
        .carousel-container { perspective: 1000px; }
        .carousel-track {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
        }
        .carousel-set {
            flex: 0 0 100%;
            transition: all 0.6s ease;
            transform: scale(0.9) rotateY(10deg);
            opacity: 0.5;
        }
        .carousel-set.active {
            transform: scale(1) rotateY(0deg);
            opacity: 1;
        }

        /* Image Grid */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }
        @media (max-width: 640px) { .image-grid { grid-template-columns: repeat(2, 1fr); } }
        
        .img-item {
            aspect-ratio: 1/1;
            border-radius: 12px;
            overflow: hidden;
            cursor: zoom-in;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s;
        }
        .img-item:hover { transform: scale(1.05); }

        /* Lightbox */
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 10, 0.9);
            backdrop-filter: blur(15px);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
    </style>
</head>
<body class="text-white py-8 md:py-12 px-4 sm:px-6">

    <div class="bg-blur-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <span class="absolute top-5 right-8 text-white text-4xl cursor-pointer">&times;</span>
        <img id="lightbox-img" src="" class="max-w-full max-h-[90vh] rounded-lg shadow-2xl transition-transform duration-300 scale-95 border-4 border-white/20">
    </div>

    <div class="max-w-4xl mx-auto relative">
        <div class="text-center mb-10 md:mb-12">
            <div class="w-24 h-24 bg-white/10 backdrop-blur-sm rounded-full mx-auto mb-4 p-1.5 shadow-lg border border-white/20 overflow-hidden">
                <img src="CURRIMAO.PNG" alt="Logo" class="w-full h-full object-cover rounded-full">
            </div>
            <h1 class="text-3xl md:text-4xl font-black text-white tracking-tight">KKDAT II Currimao</h1>
            <p class="text-blue-100 text-xs mt-1 uppercase tracking-[0.4em] font-bold">Official Social Media Hub</p>
        </div>

        <div class="mb-16 relative">
            <h2 class="text-lg font-semibold text-white mb-6 flex items-center gap-3 relative z-10">
                <span class="h-px flex-1 bg-white/10"></span>
                2026 Activity Progress Dashboard
                <span class="h-px flex-1 bg-white/10"></span>
            </h2>

            <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-stretch relative z-10">
                
                <div class="md:col-span-3 glass-card p-6 rounded-[2.5rem] flex flex-col items-center justify-center text-center">
                    <p class="text-blue-100 text-[10px] font-bold uppercase tracking-widest mb-4">Target Progress</p>
                    <div class="progress-circle-container relative w-36 h-36">
                        <svg class="w-full h-full" viewBox="0 0 100 100">
                            <circle class="text-white/10" stroke-width="8" stroke="currentColor" fill="transparent" r="40" cx="50" cy="50"/>
                            <circle class="text-cyan-400 progress-ring__circle" stroke-width="8" stroke-dasharray="251.2" stroke-dashoffset="183.3" stroke-linecap="round" stroke="currentColor" fill="transparent" r="40" cx="50" cy="50"/>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span class="text-4xl font-black text-white">20%</span>
                        </div>
                    </div>
                    <p class="mt-4 text-[10px] font-bold text-cyan-200 uppercase">Campaign Success</p>
                </div>

                <div class="md:col-span-6 glass-card p-3 rounded-[3rem] overflow-hidden shadow-2xl">
                    <div class="relative group cursor-zoom-in overflow-hidden rounded-[2.5rem] h-full min-h-[300px] border-2 border-white/10">
                        <img src="assets/PROGRESS.png" onclick="openLightbox(this.src)" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        <div class="absolute inset-0 bg-gradient-to-t from-blue-900/80 via-transparent to-transparent flex flex-col justify-end p-6">
                            <h3 class="text-white font-black text-xl">Official Progress Report</h3>
                        </div>
                    </div>
                </div>

                <div class="md:col-span-3 glass-card p-6 rounded-[2.5rem] flex flex-col items-center justify-center text-center">
                    <p class="text-blue-100 text-[10px] font-bold uppercase tracking-widest mb-4">Outreach Reach</p>
                    <div class="progress-circle-container relative w-36 h-36">
                        <svg class="w-full h-full" viewBox="0 0 100 100">
                            <circle class="text-white/10" stroke-width="8" stroke="currentColor" fill="transparent" r="40" cx="50" cy="50"/>
                            <circle class="text-sky-300 progress-ring__circle" stroke-width="8" stroke-dasharray="251.2" stroke-dashoffset="65.3" stroke-linecap="round" stroke="currentColor" fill="transparent" r="40" cx="50" cy="50"/>
                        </svg>
                        <div class="absolute inset-0 flex flex-col items-center justify-center leading-tight">
                            <span class="text-2xl font-black text-white">45</span>
                            <span class="text-[8px] font-bold text-sky-200 uppercase mb-1">Members</span>
                            <div class="w-10 h-px bg-white/20 my-1"></div>
                            <span class="text-2xl font-black text-white">93</span>
                            <span class="text-[8px] font-bold text-sky-200 uppercase">Leaflets</span>
                        </div>
                    </div>
                    <p class="mt-4 text-[10px] font-bold text-sky-200 uppercase">Community Impact</p>
                </div>

            </div>
        </div>

        <div class="mb-16 relative">
            <h2 class="text-lg font-semibold text-white mb-6 flex items-center gap-3 relative z-10">
                <span class="h-px flex-1 bg-white/10"></span> Event Gallery <span class="h-px flex-1 bg-white/10"></span>
            </h2>

            <div class="carousel-container relative overflow-hidden z-10">
                <div id="carouselTrack" class="carousel-track">
                    <div class="carousel-set active">
                        <div class="glass-card p-5 rounded-[2.5rem]">
                            <div class="image-grid">
                                <div class="img-item"><img src="assets/ELECTION/ELECT1.jpg" onclick="openLightbox(this.src)" class="w-full h-full object-cover"></div>
                                <div class="img-item"><img src="assets/ELECTION/ELECT2.jpg" onclick="openLightbox(this.src)" class="w-full h-full object-cover"></div>
                                <div class="img-item"><img src="assets/ELECTION/ELECT3.jpg" onclick="openLightbox(this.src)" class="w-full h-full object-cover"></div>
                                <div class="img-item"><img src="assets/ELECTION/ELECT4.jpg" onclick="openLightbox(this.src)" class="w-full h-full object-cover"></div>
                                <div class="img-item"><img src="assets/ELECTION/ELECT5.jpg" onclick="openLightbox(this.src)" class="w-full h-full object-cover"></div>
                                <div class="img-item"><img src="assets/ELECTION/ELECT6.jpg" onclick="openLightbox(this.src)" class="w-full h-full object-cover"></div>
                                <div class="img-item"><img src="assets/ELECTION/ELECT7.jpg" onclick="openLightbox(this.src)" class="w-full h-full object-cover"></div>
                                <div class="img-item"><img src="assets/ELECTION/ELECT8.jpg" onclick="openLightbox(this.src)" class="w-full h-full object-cover"></div>
                                <div class="img-item"><img src="assets/ELECTION/ELECT9.jpg" onclick="openLightbox(this.src)" class="w-full h-full object-cover"></div>
                                <div class="img-item"><img src="assets/ELECTION/ELECT10.jpg" onclick="openLightbox(this.src)" class="w-full h-full object-cover"></div>
                            </div>
                            <div class="mt-6 text-center">
                                <h4 class="text-white font-black text-xl">ELECTION 2026</h4>
                                <div class="bg-white/10 text-cyan-200 text-[10px] inline-block px-3 py-1.5 rounded-full mt-2 font-bold uppercase">MARCH 7, 2026</div>
                            </div>
                        </div>
                    </div>
                </div>

                <button onclick="moveCarousel(-1)" class="absolute left-3 top-1/2 -translate-y-1/2 bg-blue-950/40 p-4 rounded-full z-10 border border-white/10 transition-all text-white hover:scale-110">
                    <i class="fa-solid fa-chevron-left fa-lg"></i>
                </button>
                <button onclick="moveCarousel(1)" class="absolute right-3 top-1/2 -translate-y-1/2 bg-blue-950/40 p-4 rounded-full z-10 border border-white/10 transition-all text-white hover:scale-110">
                    <i class="fa-solid fa-chevron-right fa-lg"></i>
                </button>
            </div>
        </div>

        <footer class="text-center mt-24 opacity-60 relative z-10">
            <p class="text-[10px] uppercase tracking-[0.4em] font-bold text-white">KKDAT II Currimao • Ilocos Norte</p>
        </footer>
    </div>

    <script>
        let currentIdx = 0;
        const track = document.getElementById('carouselTrack');
        const sets = document.querySelectorAll('.carousel-set');

        function moveCarousel(dir) {
            currentIdx = (currentIdx + dir + sets.length) % sets.length;
            track.style.transform = `translateX(-${currentIdx * 100}%)`;
            sets.forEach((s, i) => i === currentIdx ? s.classList.add('active') : s.classList.remove('active'));
        }

        function openLightbox(src) {
            const lb = document.getElementById('lightbox');
            const lbImg = document.getElementById('lightbox-img');
            lbImg.src = src;
            lb.style.display = 'flex';
            setTimeout(() => lbImg.style.transform = 'scale(1)', 10);
        }

        function closeLightbox() {
            const lb = document.getElementById('lightbox');
            const lbImg = document.getElementById('lightbox-img');
            lbImg.style.transform = 'scale(0.9)';
            setTimeout(() => lb.style.display = 'none', 200);
        }
    </script>
</body>
</html>
