<div class="md:col-span-3 glass-card p-6 rounded-[2.5rem] flex flex-col items-center justify-center text-center">
    <p class="text-blue-100 text-[10px] font-bold uppercase tracking-widest mb-4">Outreach Reach</p>
    <div class="progress-circle-container relative w-40 h-40">
        <svg class="w-full h-full" viewBox="0 0 100 100">
            <circle class="text-white/5" stroke-width="4" stroke="currentColor" fill="transparent" r="42" cx="50" cy="50"/>
            <circle id="leafletsRing" class="text-sky-300 progress-ring__circle" stroke-width="4" stroke-linecap="round" stroke="currentColor" fill="transparent" r="42" cx="50" cy="50"/>
            
            <circle class="text-white/5" stroke-width="4" stroke="currentColor" fill="transparent" r="34" cx="50" cy="50"/>
            <circle id="membersRing" class="text-white progress-ring__circle" stroke-width="4" stroke-linecap="round" stroke="currentColor" fill="transparent" r="34" cx="50" cy="50"/>
        </svg>
        
        <div class="absolute inset-0 flex flex-col items-center justify-center">
            <div class="flex flex-col items-center translate-y-[-2px]">
                <span id="membersVal" class="text-xl font-black text-white leading-none">45</span>
                <span class="text-[7px] font-bold text-sky-200 uppercase tracking-tighter">Members</span>
            </div>
            
            <div class="w-8 h-px bg-white/10 my-1.5"></div>
            
            <div class="flex flex-col items-center translate-y-[2px]">
                <span id="leafletsVal" class="text-xl font-black text-white leading-none">93</span>
                <span class="text-[7px] font-bold text-sky-200 uppercase tracking-tighter">Leaflets</span>
            </div>
        </div>
    </div>
    <p class="mt-4 text-[10px] font-bold text-sky-200 uppercase">Community Impact</p>
</div>

<script>
    // Updated JavaScript Logic to match the new radii
    function updateAllProgress() {
        const mainCircle = document.getElementById('progressCircle');
        const mainPercent = 20; // Example value
        applyProgress(mainCircle, mainPercent, 40);

        // Members (Target: 300) - Radius updated to 34
        const membersRing = document.getElementById('membersRing');
        const membersCount = parseInt(document.getElementById('membersVal').innerText);
        const membersPercent = Math.min((membersCount / 300) * 100, 100);
        applyProgress(membersRing, membersPercent, 34);

        // Leaflets (Target: 3000) - Radius updated to 42
        const leafletsRing = document.getElementById('leafletsRing');
        const leafletsCount = parseInt(document.getElementById('leafletsVal').innerText);
        const leafletsPercent = Math.min((leafletsCount / 3000) * 100, 100);
        applyProgress(leafletsRing, leafletsPercent, 42);
    }

    function applyProgress(circle, percent, radius) {
        const circumference = 2 * Math.PI * radius;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        const offset = circumference - (percent / 100 * circumference);
        circle.style.strokeDashoffset = circumference;
        setTimeout(() => { circle.style.strokeDashoffset = offset; }, 100);
    }
</script>
