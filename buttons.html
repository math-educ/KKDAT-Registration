<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKDAT II Currimao - Social Hub</title>
    
    <link rel="icon" type="image/png" href="CURRIMAO.PNG">
    <meta name="theme-color" content="#0f172a">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e40af 50%, #60a5fa 100%);
            background-attachment: fixed;
            overflow-x: hidden;
            position: relative;
        }

        .bg-blur-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden;
        }

        .blob {
            position: absolute; width: 600px; height: 600px;
            border-radius: 50%; filter: blur(100px); opacity: 0.3;
            animation: move 15s infinite alternate;
        }

        .blob-1 { background: #00ffff; top: -10%; left: -10%; }
        .blob-2 { background: #1d4ed8; bottom: -10%; right: -10%; animation-delay: -3s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 50px) scale(1.1); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .carousel-container { perspective: 1200px; overflow: hidden; }
        .carousel-track {
            display: flex; transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
        }
        .carousel-set {
            flex: 0 0 100%; transition: all 0.7s ease;
            transform: scale(0.85) rotateY(15deg); opacity: 0.4;
        }
        .carousel-set.active { transform: scale(1) rotateY(0deg); opacity: 1; }

        #lightbox {
            display: none; position: fixed; inset: 0;
            background: rgba(0, 0, 10, 0.9); backdrop-filter: blur(15px);
            z-index: 100; justify-content: center; align-items: center; padding: 20px;
        }
    </style>
</head>
<body class="text-white py-8 md:py-12 px-4">

    <div class="bg-blur-container"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

    <div id="lightbox" onclick="closeLightbox()">
        <span class="absolute top-5 right-8 text-white text-4xl cursor-pointer">&times;</span>
        <img id="lightbox-img" src="" class="max-w-full max-h-[90vh] rounded-lg shadow-2xl transition-transform duration-300 scale-95 border-4 border-white/20">
    </div>

    <div class="max-w-4xl mx-auto relative">
        <div class="text-center mb-12">
            <div class="w-24 h-24 bg-white/10 backdrop-blur-sm rounded-full mx-auto mb-4 p-1 shadow-lg border border-white/20 overflow-hidden">
                <img src="CURRIMAO.PNG" alt="Logo" class="w-full h-full object-cover">
            </div>
            <h1 class="text-3xl md:text-4xl font-black tracking-tight">KKDAT II Currimao</h1>
            <p class="text-blue-100 text-xs mt-1 uppercase tracking-[0.4em] font-bold">Social Hub</p>
        </div>

        <div class="mb-16">
            <h2 class="text-sm font-bold uppercase tracking-widest text-center mb-8 opacity-50">2026 Activity Progress</h2>
            <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-stretch">
                
                <div class="md:col-span-3 glass-card p-6 rounded-[2.5rem] flex flex-col items-center justify-center">
                    <div class="relative w-32 h-32">
                        <svg class="w-full h-full" viewBox="0 0 100 100">
                            <circle class="text-white/10" stroke-width="8" fill="transparent" r="40" cx="50" cy="50"/>
                            <circle id="progressCircle" class="text-cyan-400 progress-ring__circle" stroke-width="8" stroke-linecap="round" fill="transparent" r="40" cx="50" cy="50"/>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span id="progressText" class="text-3xl font-black">20%</span>
                        </div>
                    </div>
                    <p class="mt-4 text-[10px] font-bold text-cyan-200 uppercase">Campaign Success</p>
                </div>

                <div class="md:col-span-6 glass-card p-3 rounded-[3rem] overflow-hidden">
                    <div class="relative group cursor-zoom-in rounded-[2rem] overflow-hidden h-full min-h-[250px]">
                        <img src="assets/PROGRESS.png" onclick="openLightbox(this.src)" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end p-6">
                            <h3 class="font-bold text-lg">Official Progress Report</h3>
                        </div>
                    </div>
                </div>

                <div class="md:col-span-3 glass-card p-6 rounded-[2.5rem] flex flex-col items-center justify-center">
                    <div class="relative w-32 h-32">
                        <svg class="w-full h-full" viewBox="0 0 100 100">
                            <circle class="text-white/5" stroke-width="4" fill="transparent" r="40" cx="50" cy="50"/>
                            <circle id="leafletsRing" class="text-sky-300 progress-ring__circle" stroke-width="4" stroke-linecap="round" fill="transparent" r="40" cx="50" cy="50"/>
                            <circle class="text-white/5" stroke-width="4" fill="transparent" r="32" cx="50" cy="50"/>
                            <circle id="membersRing" class="text-white progress-ring__circle" stroke-width="4" stroke-linecap="round" fill="transparent" r="32" cx="50" cy="50"/>
                        </svg>
                        <div class="absolute inset-0 flex flex-col items-center justify-center scale-90">
                            <span id="membersVal" class="text-xl font-black">45</span>
                            <span class="text-[7px] font-bold uppercase">Members</span>
                            <div class="w-8 h-px bg-white/20 my-1"></div>
                            <span id="leafletsVal" class="text-xl font-black">930</span>
                            <span class="text-[7px] font-bold uppercase">Leaflets</span>
                        </div>
                    </div>
                    <p class="mt-4 text-[10px] font-bold text-sky-200 uppercase">Community Impact</p>
                </div>
            </div>
        </div>

        <div class="mb-16">
            <h2 class="text-sm font-bold uppercase tracking-widest mb-6"><i class="fas fa-video mr-2"></i> Featured Videos</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass-card p-2 rounded-3xl overflow-hidden aspect-video">
                    <iframe class="w-full h-full rounded-2xl" src="https://www.youtube.com/embed/VIDEO_ID_1" frameborder="0" allowfullscreen></iframe>
                </div>
                <div class="glass-card p-2 rounded-3xl overflow-hidden aspect-video">
                    <iframe class="w-full h-full rounded-2xl" src="https://www.youtube.com/embed/VIDEO_ID_2" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
        </div>

        <div class="mb-16">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-sm font-bold uppercase tracking-widest"><i class="fas fa-camera-retro mr-2"></i> Activity Gallery</h2>
                <div class="flex gap-2">
                    <button onclick="moveCarousel(-1)" class="w-10 h-10 glass-card rounded-full hover:bg-white/10 transition-colors"><i class="fas fa-chevron-left"></i></button>
                    <button onclick="moveCarousel(1)" class="w-10 h-10 glass-card rounded-full hover:bg-white/10 transition-colors"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            
            <div class="carousel-container">
                <div id="carouselTrack" class="carousel-track">
                    <div class="carousel-set active">
                        <div class="grid grid-cols-5 gap-2">
                            <div class="aspect-square rounded-lg overflow-hidden glass-card cursor-zoom-in">
                                <img src="assets/img1.jpg" onclick="openLightbox(this.src)" class="w-full h-full object-cover">
                            </div>
                            </div>
                        <div class="mt-4 text-center">
                            <h4 class="font-bold text-sm">Community Outreach Program</h4>
                            <p class="text-[10px] opacity-60 uppercase">March 15, 2026</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="text-center py-10 opacity-40 text-[10px] font-bold uppercase tracking-[0.3em]">
            KKDAT II Currimao • Ilocos Norte
        </footer>
    </div>

    <script>
        let currentSet = 0;
        function moveCarousel(dir) {
            const track = document.getElementById('carouselTrack');
            const sets = document.querySelectorAll('.carousel-set');
            sets[currentSet].classList.remove('active');
            currentSet = (currentSet + dir + sets.length) % sets.length;
            track.style.transform = `translateX(-${currentSet * 100}%)`;
            sets[currentSet].classList.add('active');
        }

        function updateAllProgress() {
            applyProgress(document.getElementById('progressCircle'), parseInt(document.getElementById('progressText').innerText), 40);
            applyProgress(document.getElementById('membersRing'), (parseInt(document.getElementById('membersVal').innerText)/300)*100, 32);
            applyProgress(document.getElementById('leafletsRing'), (parseInt(document.getElementById('leafletsVal').innerText)/3000)*100, 40);
        }

        function applyProgress(el, percent, r) {
            const c = 2 * Math.PI * r;
            el.style.strokeDasharray = `${c} ${c}`;
            el.style.strokeDashoffset = c - (Math.min(percent, 100) / 100 * c);
        }

        function openLightbox(src) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = src; lb.style.display = 'flex';
            setTimeout(() => img.style.transform = 'scale(1)', 10);
        }

        function closeLightbox() {
            document.getElementById('lightbox-img').style.transform = 'scale(0.9)';
            setTimeout(() => document.getElementById('lightbox').style.display = 'none', 200);
        }

        window.onload = updateAllProgress;
    </script>
</body>
</html>
