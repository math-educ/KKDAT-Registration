<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKDAT II Currimao - Social Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e40af 50%, #60a5fa 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .bg-blur-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden;
        }

        .blob {
            position: absolute; width: 600px; height: 600px;
            border-radius: 50%; filter: blur(100px); opacity: 0.3;
            animation: move 15s infinite alternate;
        }
        .blob-1 { background: #00ffff; top: -10%; left: -10%; }
        .blob-2 { background: #1d4ed8; bottom: -10%; right: -10%; animation-delay: -3s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1) rotate(0deg); }
            to { transform: translate(150px, 80px) scale(1.1) rotate(5deg); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        
        /* THE ANIMATION RINGS CSS */
        .progress-ring__circle {
            transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
        }
        .carousel-set {
            flex: 0 0 100%;
            transition: all 0.6s ease;
            transform: scale(0.9) rotateY(10deg);
            opacity: 0.5;
        }
        .carousel-set.active { transform: scale(1) rotateY(0deg); opacity: 1; }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }
        @media (max-width: 640px) { .image-grid { grid-template-columns: repeat(2, 1fr); } }
        
        .img-item {
            aspect-ratio: 1/1; border-radius: 12px; overflow: hidden;
            cursor: zoom-in; border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s;
        }
        .img-item:hover { transform: scale(1.05); }

        #lightbox {
            display: none; position: fixed; inset: 0;
            background: rgba(0, 0, 10, 0.9); backdrop-filter: blur(15px);
            z-index: 100; justify-content: center; align-items: center; padding: 20px;
        }
    </style>
</head>
<body class="text-white py-8 px-4 sm:px-6">

    <div class="bg-blur-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <span class="absolute top-5 right-8 text-white text-4xl cursor-pointer">&times;</span>
        <img id="lightbox-img" src="" class="max-w-full max-h-[90vh] rounded-lg shadow-2xl transition-transform duration-300 scale-95 border-4 border-white/20">
    </div>

    <div class="max-w-5xl mx-auto relative">
        <div class="text-center mb-12">
            <div class="w-24 h-24 bg-white/10 backdrop-blur-sm rounded-full mx-auto mb-4 p-1 shadow-lg border border-white/20 overflow-hidden">
                <img src="CURRIMAO.PNG" alt="Logo" class="w-full h-full object-cover">
            </div>
            <h1 class="text-3xl md:text-5xl font-black tracking-tighter">KKDAT II Currimao</h1>
            <p class="text-blue-200 text-xs mt-1 uppercase tracking-[0.4em] font-bold">2026 Social Hub</p>
        </div>

        <div class="mb-16">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                <div class="md:col-span-3 glass-card p-6 rounded-[2.5rem] flex flex-col items-center justify-center">
                    <div class="relative w-32 h-32">
                        <svg class="w-full h-full" viewBox="0 0 100 100">
                            <circle class="text-white/10" stroke-width="8" fill="transparent" r="40" cx="50" cy="50"/>
                            <circle id="progressCircle" class="text-cyan-400 progress-ring__circle" stroke-width="8" stroke-linecap="round" fill="transparent" r="40" cx="50" cy="50"/>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span id="progressText" class="text-3xl font-black">20%</span>
                        </div>
                    </div>
                    <p class="mt-4 text-[10px] font-bold text-cyan-200 uppercase">Target Success</p>
                </div>

                <div class="md:col-span-6 glass-card p-3 rounded-[3rem] overflow-hidden">
                    <div class="relative group cursor-zoom-in rounded-[2rem] overflow-hidden h-full min-h-[300px]">
                        <img src="assets/PROGRESS.png" onclick="openLightbox(this.src)" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                        <div class="absolute inset-0 bg-gradient-to-t from-blue-900/80 to-transparent flex flex-col justify-end p-6">
                            <h3 class="text-white font-black text-xl">Official Progress Report</h3>
                        </div>
                    </div>
                </div>

                <div class="md:col-span-3 glass-card p-6 rounded-[2.5rem] flex flex-col items-center justify-center">
                    <div class="relative w-32 h-32">
                        <svg class="w-full h-full" viewBox="0 0 100 100">
                            <circle class="text-white/5" stroke-width="4" fill="transparent" r="40" cx="50" cy="50"/>
                            <circle id="leafletsRing" class="text-sky-300 progress-ring__circle" stroke-width="4" stroke-linecap="round" fill="transparent" r="40" cx="50" cy="50"/>
                            <circle class="text-white/5" stroke-width="4" fill="transparent" r="32" cx="50" cy="50"/>
                            <circle id="membersRing" class="text-white progress-ring__circle" stroke-width="4" stroke-linecap="round" fill="transparent" r="32" cx="50" cy="50"/>
                        </svg>
                        <div class="absolute inset-0 flex flex-col items-center justify-center scale-90">
                            <span id="membersVal" class="text-xl font-black">45</span>
                            <span class="text-[7px] font-bold uppercase mb-1">Members</span>
                            <div class="w-8 h-px bg-white/20 my-1"></div>
                            <span id="leafletsVal" class="text-xl font-black">930</span>
                            <span class="text-[7px] font-bold uppercase">Leaflets</span>
                        </div>
                    </div>
                    <p class="mt-4 text-[10px] font-bold text-sky-200 uppercase">Community Impact</p>
                </div>
            </div>
        </div>

        <div class="mb-16">
            <h2 class="text-sm font-black uppercase tracking-widest mb-6 opacity-60">Activity Gallery</h2>
            <div class="carousel-container relative overflow-hidden">
                <div id="carouselTrack" class="carousel-track">
                    <div class="carousel-set active">
                        <div class="glass-card p-5 rounded-[2.5rem]">
                            <div class="image-grid">
                                <div class="img-item"><img src="assets/OPLAN KRUS/OK1.jpg" onclick="openLightbox(this.src)" class="w-full h-full object-cover"></div>
                                <div class="img-item"><img src="assets/OPLAN KRUS/OK2.jpg" onclick="openLightbox(this.src)" class="w-full h-full object-cover"></div>
                                <div class="img-item"><img src="assets/OPLAN KRUS/OK3.jpg" onclick="openLightbox(this.src)" class="w-full h-full object-cover"></div>
                                <div class="img-item"><img src="assets/OPLAN KRUS/OK4.jpg" onclick="openLightbox(this.src)" class="w-full h-full object-cover"></div>
                                <div class="img-item"><img src="assets/OPLAN KRUS/OK5.jpg" onclick="openLightbox(this.src)" class="w-full h-full object-cover"></div>
                                <div class="img-item"><img src="assets/OPLAN KRUS/OK6.jpg" onclick="openLightbox(this.src)" class="w-full h-full object-cover"></div>
                                <div class="img-item"><img src="assets/OPLAN KRUS/OK7.jpg" onclick="openLightbox(this.src)" class="w-full h-full object-cover"></div>
                                <div class="img-item"><img src="assets/OPLAN KRUS/OK8.jpg" onclick="openLightbox(this.src)" class="w-full h-full object-cover"></div>
                                <div class="img-item"><img src="assets/OPLAN KRUS/OK9.jpg" onclick="openLightbox(this.src)" class="w-full h-full object-cover"></div>
                                <div class="img-item"><img src="assets/OPLAN KRUS/OK10.jpg" onclick="openLightbox(this.src)" class="w-full h-full object-cover"></div>
                            </div>
                            <div class="mt-6 text-center">
                                <h4 class="font-extrabold text-lg">OPLAN KRUS - Leaflets Distribution</h4>
                                <p class="text-[10px] opacity-60">APRIL 4, 2026</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-16">
            <a href="https://youtube.com/watch?v=3JZ_D3ELwOQ" target="_blank" class="glass-card block rounded-[2.5rem] overflow-hidden group">
                <img src="https://img.youtube.com/vi/3JZ_D3ELwOQ/maxresdefault.jpg" class="w-full aspect-video object-cover transition-transform group-hover:scale-105">
                <div class="p-6"><h3 class="font-black">Anniversary Highlights</h3></div>
            </a>
            <a href="https://www.facebook.com/reel/2106853370157580" target="_blank" class="glass-card block rounded-[2.5rem] overflow-hidden group">
                <img src="assets/SEMANA SANTA.jpg" class="w-full aspect-video object-cover transition-transform group-hover:scale-105">
                <div class="p-6"><h3 class="font-black">Ligtas SUMVAC 2026</h3></div>
            </a>
        </div>

        <footer class="text-center py-12 opacity-50 text-[10px] font-black uppercase tracking-[0.5em]">
            KKDAT II Currimao • Ilocos Norte
        </footer>
    </div>

    <script>
        // RING ANIMATION LOGIC
        function updateAllProgress() {
            // Main Target (20%)
            applyProgress(document.getElementById('progressCircle'), parseInt(document.getElementById('progressText').innerText), 40);
            
            // Members (Current: 45 / Target: 300)
            const memVal = parseInt(document.getElementById('membersVal').innerText);
            applyProgress(document.getElementById('membersRing'), (memVal / 300) * 100, 32);
            
            // Leaflets (Current: 930 / Target: 3000)
            const leafVal = parseInt(document.getElementById('leafletsVal').innerText);
            applyProgress(document.getElementById('leafletsRing'), (leafVal / 3000) * 100, 40);
        }

        function applyProgress(el, percent, r) {
            const c = 2 * Math.PI * r;
            el.style.strokeDasharray = `${c} ${c}`;
            el.style.strokeDashoffset = c - (Math.min(percent, 100) / 100 * c);
        }

        // LIGHTBOX
        function openLightbox(src) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = src; lb.style.display = 'flex';
            setTimeout(() => img.style.transform = 'scale(1)', 10);
        }
        function closeLightbox() {
            document.getElementById('lightbox-img').style.transform = 'scale(0.9)';
            setTimeout(() => document.getElementById('lightbox').style.display = 'none', 200);
        }

        window.onload = updateAllProgress;
    </script>
</body>
</html>
