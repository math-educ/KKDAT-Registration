<div class="mb-16 relative">
    <div class="absolute -top-10 -left-10 w-20 h-20 bg-cyan-400 rounded-full blur-3xl opacity-30"></div>
    
    <h2 class="text-lg font-semibold text-white mb-6 flex items-center gap-3 drop-shadow-sm relative z-10">
        <span class="h-px flex-1 bg-white/10"></span>
        2026 Activity Progress Dashboard
        <span class="h-px flex-1 bg-white/10"></span>
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-center relative z-10">
        
        <div class="md:col-span-3 glass-card p-6 rounded-[2.5rem] flex flex-col items-center justify-center text-center h-full">
            <p class="text-blue-100 text-[10px] font-bold uppercase tracking-widest mb-4">Target Progress</p>
            <div class="progress-circle-container relative w-32 h-32">
                <svg class="w-full h-full" viewBox="0 0 100 100">
                    <circle class="text-white/10" stroke-width="8" stroke="currentColor" fill="transparent" r="40" cx="50" cy="50"/>
                    <circle class="text-cyan-400 progress-ring__circle" stroke-width="8" stroke-dasharray="251.2" stroke-dashoffset="183.3" stroke-linecap="round" stroke="currentColor" fill="transparent" r="40" cx="50" cy="50"/>
                </svg>
                <div class="absolute inset-0 flex items-center justify-center">
                    <span class="text-3xl font-black text-white">20%</span>
                </div>
            </div>
            <p class="mt-4 text-[10px] font-bold text-cyan-200 uppercase tracking-tighter">Project PUSO Status</p>
        </div>

        <div class="md:col-span-6 glass-card p-3 rounded-[3rem] overflow-hidden shadow-2xl">
            <div class="relative group cursor-zoom-in overflow-hidden rounded-[2.5rem] aspect-square border-2 border-white/10">
                <img 
                    src="assets/PROGRESS.png" 
                    onclick="openLightbox(this.src)" 
                    class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                    alt="Progress Report"
                >
                <div class="absolute inset-0 bg-gradient-to-t from-blue-900/90 via-transparent to-transparent flex flex-col justify-end p-6">
                    <h3 class="text-white font-extrabold text-xl">Official Progress Report</h3>
                    <p class="text-blue-100 text-xs">Click to expand details</p>
                </div>
            </div>
        </div>

        <div class="md:col-span-3 glass-card p-6 rounded-[2.5rem] flex flex-col items-center justify-center text-center h-full">
            <p class="text-blue-100 text-[10px] font-bold uppercase tracking-widest mb-4">Outreach Reach</p>
            <div class="progress-circle-container relative w-32 h-32">
                <svg class="w-full h-full" viewBox="0 0 100 100">
                    <circle class="text-white/10" stroke-width="8" stroke="currentColor" fill="transparent" r="40" cx="50" cy="50"/>
                    <circle class="text-sky-300 progress-ring__circle" stroke-width="8" stroke-dasharray="251.2" stroke-dashoffset="65.3" stroke-linecap="round" stroke="currentColor" fill="transparent" r="40" cx="50" cy="50"/>
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center leading-none">
                    <span class="text-xl font-black text-white">45</span>
                    <span class="text-[8px] font-bold text-sky-200 uppercase mt-1">Members</span>
                    <div class="w-8 h-px bg-white/20 my-1"></div>
                    <span class="text-xl font-black text-white">93</span>
                    <span class="text-[8px] font-bold text-sky-200 uppercase mt-1">Leaflets</span>
                </div>
            </div>
            <p class="mt-4 text-[10px] font-bold text-sky-200 uppercase tracking-tighter">Community Impact</p>
        </div>

    </div>
</div>
