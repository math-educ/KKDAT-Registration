<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .table-container { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-900 to-slate-900 pb-12">

    <nav class="fixed top-0 left-0 right-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </div>
                <span class="text-white font-bold text-lg">MemberTrack Pro</span>
            </div>
            <div class="flex gap-4">
                <a href="REGFORM.html" class="text-white/70 hover:text-white px-4 py-2 rounded-lg text-sm transition-all">New Member</a>
                <a href="MONITOR.html" class="text-white bg-white/20 px-4 py-2 rounded-lg text-sm font-medium">Members List</a>
            </div>
        </div>
    </nav>

    <div class="relative max-w-[95%] mx-auto pt-24">
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-4 fade-in">
            <div>
                <h1 class="text-3xl font-bold text-white">Member Dashboard</h1>
                <p class="text-indigo-200 text-sm">Managing all registered community members</p>
            </div>
            <div class="relative w-full lg:w-96">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <input type="text" id="searchInput" placeholder="Search by name, ID or address..." 
                    class="pl-10 pr-4 py-3 rounded-xl w-full outline-none border-none shadow-lg focus:ring-2 focus:ring-indigo-500 transition-all" 
                    onkeyup="renderTable()">
            </div>
        </div>

        <div class="glass-panel rounded-3xl shadow-2xl overflow-hidden border border-white/10 fade-in">
            <div class="overflow-x-auto table-container">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/50 border-b border-slate-200">
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Member Details</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Address</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Emergency Contact</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Social</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100">
                        <!-- Rows will be injected here -->
                    </tbody>
                </table>
            </div>
            <div id="emptyState" class="hidden p-20 text-center">
                <p class="text-slate-400 text-lg text-bold">No members found matching your search.</p>
            </div>
        </div>
    </div>

    <script>
        function renderTable() {
            const members = JSON.parse(localStorage.getItem('members') || '[]');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            
            tbody.innerHTML = '';

            const filteredMembers = members.filter(m => 
                m.fullName.toLowerCase().includes(search) || 
                m.id.toLowerCase().includes(search) ||
                (m.address && m.address.toLowerCase().includes(search))
            );

            if (filteredMembers.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                filteredMembers.reverse().forEach((m, index) => {
                    // Actual index in the original array for deletion
                    const originalIndex = members.findIndex(item => item.id === m.id);
                    
                    const row = `
                        <tr class="hover:bg-indigo-50/30 transition-colors group">
                            <td class="px-6 py-5">
                                <div class="flex flex-col">
                                    <span class="text-xs font-bold text-indigo-600 mb-1">${m.id}</span>
                                    <span class="font-bold text-slate-800 text-lg">${m.fullName}</span>
                                    <span class="text-sm text-slate-500">${m.age} yrs • ${m.sex} • ${m.civilStatus}</span>
                                </div>
                            </td>
                            <td class="px-6 py-5">
                                <p class="text-sm text-slate-600 max-w-xs leading-relaxed">${m.address || 'N/A'}</p>
                            </td>
                            <td class="px-6 py-5">
                                <div class="flex items-center gap-2">
                                    <div class="p-2 bg-slate-100 rounded-lg group-hover:bg-white transition-colors">
                                        <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2"></path></svg>
                                    </div>
                                    <span class="text-sm font-medium text-slate-700">${m.contactPerson || 'N/A'}</span>
                                </div>
                            </td>
                            <td class="px-6 py-5">
                                ${m.facebook ? `
                                    <a href="${m.facebook.startsWith('http') ? m.facebook : 'https://facebook.com' + m.facebook}" target="_blank" 
                                       class="inline-flex items-center gap-2 px-3 py-1.5 bg-blue-50 text-blue-600 rounded-lg text-xs font-bold hover:bg-blue-600 hover:text-white transition-all">
                                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                                        Profile
                                    </a>
                                ` : '<span class="text-xs text-slate-400 italic">No link</span>'}
                            </td>
                            <td class="px-6 py-5 text-center">
                                <button onclick="deleteMember(${originalIndex})" 
                                    class="p-2 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-xl transition-all" title="Delete Member">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            }
        }

        function deleteMember(index) {
            if(confirm('Are you sure you want to permanently delete this member record?')) {
                const members = JSON.parse(localStorage.getItem('members') || '[]');
                members.splice(index, 1);
                localStorage.setItem('members', JSON.stringify(members));
                renderTable();
            }
        }

        window.onload = renderTable;
    </script>
</body>
</html>
