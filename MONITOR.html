<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 pt-24 px-4">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-slate-900 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center text-white">
            <span class="font-bold">MemberTrack Pro</span>
            <div class="space-x-4">
                <a href="REGFORM.html" class="text-white/70 hover:text-white">New Member</a>
                <a href="MONITOR.html" class="bg-white/20 px-4 py-2 rounded">Members List</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">Registered Members</h1>
            <input type="text" id="search" placeholder="Search members..." onkeyup="loadMembers()" class="p-2 border rounded-lg w-64">
        </div>

        <div class="bg-white rounded-xl shadow overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-100">
                    <tr>
                        <th class="p-4">ID</th>
                        <th class="p-4">Name</th>
                        <th class="p-4">Age</th>
                        <th class="p-4">Joined</th>
                        <th class="p-4">Status</th>
                        <th class="p-4">Actions</th>
                    </tr>
                </thead>
                <tbody id="memberTable">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        function loadMembers() {
            const tableBody = document.getElementById('memberTable');
            const searchTerm = document.getElementById('search').value.toLowerCase();
            const members = JSON.parse(localStorage.getItem('members') || '[]');
            
            tableBody.innerHTML = '';

            const filteredMembers = members.filter(m => 
                m.fullName.toLowerCase().includes(searchTerm) || m.id.toLowerCase().includes(searchTerm)
            );

            filteredMembers.forEach((member, index) => {
                tableBody.innerHTML += `
                    <tr class="border-t hover:bg-slate-50">
                        <td class="p-4 text-sm">${member.id}</td>
                        <td class="p-4 font-medium">${member.fullName}</td>
                        <td class="p-4">${member.age}</td>
                        <td class="p-4">${member.dateJoined}</td>
                        <td class="p-4"><span class="bg-emerald-100 text-emerald-700 px-2 py-1 rounded-full text-xs">${member.status}</span></td>
                        <td class="p-4">
                            <button onclick="deleteMember('${member.id}')" class="text-rose-600 hover:underline">Delete</button>
                        </td>
                    </tr>
                `;
            });

            if (filteredMembers.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-slate-400">No members found</td></tr>';
            }
        }

        function deleteMember(id) {
            if(confirm('Are you sure you want to delete this member?')) {
                let members = JSON.parse(localStorage.getItem('members') || '[]');
                members = members.filter(m => m.id !== id);
                localStorage.setItem('members', JSON.stringify(members));
                loadMembers();
            }
        }

        // Initial Load
        window.onload = loadMembers;
    </script>
</body>
</html>
