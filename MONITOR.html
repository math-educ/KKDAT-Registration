<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Dashboard - Full View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .table-container { scrollbar-width: thin; scrollbar-color: #6366f1 transparent; }
        .data-label { font-size: 0.65rem; text-transform: uppercase; font-weight: 700; color: #94a3b8; margin-bottom: 2px; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-900 to-slate-900 pb-12">

    <nav class="fixed top-0 left-0 right-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </div>
                <span class="text-white font-bold text-lg">MemberTrack Pro</span>
            </div>
            <div class="flex gap-4">
                <a href="REGFORM.html" class="text-white/70 hover:text-white px-4 py-2 rounded-lg text-sm transition-all">Add New</a>
                <a href="MONITOR.html" class="text-white bg-white/20 px-4 py-2 rounded-lg text-sm font-medium">Full Registry</a>
            </div>
        </div>
    </nav>

    <div class="relative max-w-[98%] mx-auto pt-24 px-2">
        <div class="flex flex-col md:flex-row justify-between items-end mb-8 gap-4 px-2">
            <div>
                <h1 class="text-3xl font-bold text-white">Full Member Registry</h1>
                <p class="text-indigo-200 text-sm">Detailed view of all registered profiles</p>
            </div>
            <div class="relative w-full md:w-80">
                <input type="text" id="searchInput" placeholder="Search anything..." 
                    class="pl-10 pr-4 py-3 rounded-xl w-full outline-none border-none shadow-xl focus:ring-2 focus:ring-indigo-500 transition-all" 
                    onkeyup="renderTable()">
                <span class="absolute left-3 top-3.5 text-slate-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2"></path></svg>
                </span>
            </div>
        </div>

        <div class="glass-panel rounded-3xl shadow-2xl overflow-hidden border border-white/10">
            <div class="overflow-x-auto table-container">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/80 border-b border-slate-200">
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Member Profile</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Birth & Status</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Complete Address</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Social & Emergency</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase text-center">Admin</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100 bg-white">
                        <!-- Content injected via JS -->
                    </tbody>
                </table>
            </div>
            <div id="emptyState" class="hidden p-20 text-center bg-white">
                <div class="text-slate-300 mb-4 flex justify-center">
                    <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </div>
                <p class="text-slate-500 text-lg font-medium">No member records found.</p>
            </div>
        </div>
    </div>

    <script>
        function renderTable() {
            const members = JSON.parse(localStorage.getItem('members') || '[]');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            
            tbody.innerHTML = '';

            const filtered = members.filter(m => 
                Object.values(m).some(val => String(val).toLowerCase().includes(search))
            );

            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            filtered.reverse().forEach((m) => {
                // Find actual index in original storage for deletion
                const originalIndex = members.findIndex(item => item.id === m.id);
                
                const row = `
                    <tr class="hover:bg-slate-50/80 transition-colors group">
                        <!-- Profile Column -->
                        <td class="px-6 py-6">
                            <div class="flex flex-col">
                                <span class="text-[10px] font-black text-indigo-500 mb-1 tracking-widest uppercase">${m.id}</span>
                                <span class="font-bold text-slate-900 text-lg leading-tight">${m.fullName}</span>
                                <span class="text-sm text-slate-500 mt-1 italic">Joined: ${m.dateJoined}</span>
                            </div>
                        </td>

                        <!-- Birth & Status Column -->
                        <td class="px-6 py-6">
                            <div class="flex flex-col space-y-2">
                                <div>
                                    <p class="data-label">Age / Sex</p>
                                    <p class="text-sm font-semibold text-slate-700">${m.age} yrs old • ${m.sex}</p>
                                </div>
                                <div>
                                    <p class="data-label">Civil Status / B-Day</p>
                                    <p class="text-sm text-slate-600">${m.civilStatus} • ${m.birthDate}</p>
                                </div>
                            </div>
                        </td>

                        <!-- Address Column -->
                        <td class="px-6 py-6">
                            <div class="max-w-xs">
                                <p class="data-label">Residential Address</p>
                                <p class="text-sm text-slate-600 leading-relaxed">${m.address || 'Not Provided'}</p>
                            </div>
                        </td>

                        <!-- Social & Emergency Column -->
                        <td class="px-6 py-6">
                            <div class="flex flex-col space-y-3">
                                <div>
                                    <p class="data-label">Emergency Contact</p>
                                    <p class="text-sm font-bold text-slate-800">${m.contactPerson || 'None'}</p>
                                </div>
                                ${m.facebook ? `
                                    <a href="${m.facebook.startsWith('http') ? m.facebook : 'https://facebook.com' + m.facebook}" target="_blank" 
                                       class="inline-flex items-center gap-2 text-blue-600 hover:text-blue-800 transition-colors">
                                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                                        <span class="text-xs font-bold border-b border-blue-200">View Facebook</span>
                                    </a>
                                ` : '<span class="text-[10px] text-slate-400">NO FB PROFILE</span>'}
                            </div>
                        </td>

                        <!-- Action Column -->
                        <td class="px-6 py-6 text-center">
                            <button onclick="deleteMember(${originalIndex})" 
                                class="p-3 text-slate-300 hover:text-rose-600 hover:bg-rose-50 rounded-2xl transition-all">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        function deleteMember(index) {
            if(confirm('Are you sure? This will permanently delete all records for this member.')) {
                const members = JSON.parse(localStorage.getItem('members') || '[]');
                members.splice(index, 1);
                localStorage.setItem('members', JSON.stringify(members));
                renderTable();
            }
        }

        window.onload = renderTable;
    </script>
</body>
</html>
