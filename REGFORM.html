<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKDAT Member Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .input-field { transition: all 0.2s ease; border: 1px solid #e2e8f0; }
        .input-field:focus { border-color: #6366f1; ring: 2px; ring-color: #6366f1; outline: none; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
    <script type="module">
  // Import Firebase functions
  import { initializeApp } from "https://www.gstatic.com";
  import { getDatabase, ref, push, set } from "https://www.gstatic.com";

  // TODO: Replace this with your actual config from the Firebase Console
        
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT.firebaseio.com",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "...",
    appId: "..."
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Update your form submission
  document.getElementById('registrationForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const memberData = {
          fullName: document.getElementById('fullName').value,
          sex: document.getElementById('sex').value,
          birthDate: document.getElementById('birthDate').value,
          age: document.getElementById('age').value,
          address: document.getElementById('address').value,
          dateJoined: new Date().toLocaleDateString(),
          status: 'Active'
      };

      // Push to Firebase (this creates a unique ID automatically)
      const membersRef = ref(db, 'members');
      const newMemberRef = push(membersRef);
      set(newMemberRef, memberData).then(() => {
          alert('Saved to Cloud Successfully!');
          window.location.href = 'MONITOR.html';
      });
  });
</script>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-900 to-slate-900 py-12 px-4">

    <nav class="fixed top-0 left-0 right-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <!-- Logo Container -->
                <div class="w-12 h-12 rounded-x1 overflow-hidden bg-indigo flex items-center justify-center shadow-lg">
                    <img src="CURRIMAO.PNG" alt="KKDAT Logo" class="w-full h-full object-cover">
                </div>
                <!-- Organization Name -->
                <span class="text-white font-bold text-lg tracking-tight">KKDAT Ilocandia Inc. Currimao</span>
            </div>
            <div class="flex gap-4">
                <a href="REGFORM.html" class="text-white bg-white/20 px-4 py-2 rounded-lg text-sm font-medium">New Member</a>
                <a href="MONITOR.html" class="text-white/70 hover:text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">Members List</a>
            </div>
        </div>
    </nav>

    <div class="relative max-w-5xl mx-auto pt-24">
        <div class="text-center mb-10 fade-in">
            <h1 class="text-4xl font-bold text-white mb-2">KKDAT II Currimao Registration</h1>
            <p class="text-indigo-200">Complete the form below to register as a new member</p>
        </div>

        <div class="glass-panel rounded-3xl shadow-2xl p-6 md:p-10 fade-in">
            <form id="registrationForm" class="space-y-8">
                
                <!-- Section 1: Personal Details -->
                <div class="bg-slate-50/50 rounded-2xl p-6 border border-slate-100">
                    <div class="flex items-center gap-2 mb-6">
                        <div class="w-2 h-6 bg-indigo-600 rounded-full"></div>
                        <h2 class="text-xl font-semibold text-slate-800">Personal Information</h2>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-slate-700 mb-2">Full Name *</label>
                            <input type="text" id="fullName" required class="input-field w-full px-4 py-3 rounded-xl" placeholder="Juan Dela Cruz">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Sex *</label>
                            <select id="sex" required class="input-field w-full px-4 py-3 rounded-xl bg-white">
                                <option value="">Select sex</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Birthday *</label>
                            <input type="date" id="birthDate" required class="input-field w-full px-4 py-3 rounded-xl">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Age</label>
                            <input type="number" id="age" readonly class="input-field w-full px-4 py-3 rounded-xl bg-slate-100 text-slate-500 font-semibold" placeholder="0">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Civil Status *</label>
                            <select id="civilStatus" required class="input-field w-full px-4 py-3 rounded-xl bg-white">
                                <option value="Single">Single</option>
                                <option value="Married">Married</option>
                                <option value="Widowed">Widowed</option>
                                <option value="Separated">Separated</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Section 2: Contact & Socials -->
                <div class="bg-slate-50/50 rounded-2xl p-6 border border-slate-100">
                    <div class="flex items-center gap-2 mb-6">
                        <div class="w-2 h-6 bg-purple-600 rounded-full"></div>
                        <h2 class="text-xl font-semibold text-slate-800">Contact & Social Media</h2>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-slate-700 mb-2">Complete Address *</label>
                            <textarea id="address" required rows="2" class="input-field w-full px-4 py-3 rounded-xl" placeholder="Barangay, City, Province"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Facebook Profile Link/Name</label>
                            <input type="text" id="facebook" class="input-field w-full px-4 py-3 rounded-xl" placeholder="://facebook.com">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Contact Person (In case of emergency) *</label>
                            <input type="text" id="contactPerson" required class="input-field w-full px-4 py-3 rounded-xl" placeholder="Name of Relative and Contact Number">
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex flex-col sm:flex-row justify-end gap-4 pt-6">
                    <button type="reset" class="px-8 py-4 bg-slate-200 text-slate-700 rounded-2xl font-bold hover:bg-slate-300 transition-all">Clear Form</button>
                    <button type="submit" class="px-10 py-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-2xl font-bold hover:shadow-lg hover:shadow-indigo-500/30 transition-all">Register Member</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Auto-calculate Age accurately
        document.getElementById('birthDate').addEventListener('change', function() {
            if (!this.value) return;
            const birthDate = new Date(this.value);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) { age--; }
            document.getElementById('age').value = age >= 0 ? age : 0;
        });

        // Form Submission Logic
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const memberData = {
                id: 'MEM-' + Date.now().toString().slice(-6),
                fullName: document.getElementById('fullName').value,
                sex: document.getElementById('sex').value,
                birthDate: document.getElementById('birthDate').value,
                age: document.getElementById('age').value,
                civilStatus: document.getElementById('civilStatus').value,
                address: document.getElementById('address').value,
                facebook: document.getElementById('facebook').value,
                contactPerson: document.getElementById('contactPerson').value,
                dateJoined: new Date().toLocaleDateString(),
                status: 'Active'
            };

            // LocalStorage Persistence
            try {
                const members = JSON.parse(localStorage.getItem('members') || '[]');
                members.push(memberData);
                localStorage.setItem('members', JSON.stringify(members));
                
                alert('Member Registered Successfully!');
                window.location.href = 'MONITOR.html';
            } catch (error) {
                console.error("Storage error:", error);
                alert('An error occurred while saving. Please try again.');
            }
        });
    </script>
</body>
</html>
