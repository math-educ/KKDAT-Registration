<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-900 to-slate-900 py-12 px-4">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-white/10 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center text-white">
            <span class="font-bold">MemberTrack Pro</span>
            <div class="space-x-4">
                <a href="REGFORM.html" class="bg-white/20 px-4 py-2 rounded">New Member</a>
                <a href="MONITOR.html" class="text-white/70 hover:text-white">Members List</a>
            </div>
        </div>
    </nav>

    <div class="relative max-w-4xl mx-auto pt-24">
        <div class="glass-panel rounded-3xl p-8 shadow-2xl">
            <h1 class="text-3xl font-bold mb-6 text-slate-800">Registration Form</h1>
            <form id="registrationForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Full Name</label>
                        <input type="text" id="fullName" required class="w-full p-3 border rounded-xl">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Sex</label>
                        <select id="sex" required class="w-full p-3 border rounded-xl">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Birthday</label>
                        <input type="date" id="birthDate" required class="w-full p-3 border rounded-xl">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Age</label>
                        <input type="number" id="age" readonly class="w-full p-3 border rounded-xl bg-slate-100">
                    </div>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold hover:bg-indigo-700 transition">Register Member</button>
            </form>
        </div>
    </div>

    <script>
        // Automatic Age Calculation
        document.getElementById('birthDate').addEventListener('change', function() {
            const birthDate = new Date(this.value);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--;
            document.getElementById('age').value = age;
        });

        // Form Submission Logic
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newMember = {
                id: 'MEM-' + Date.now(),
                fullName: document.getElementById('fullName').value,
                sex: document.getElementById('sex').value,
                birthDate: document.getElementById('birthDate').value,
                age: document.getElementById('age').value,
                dateJoined: new Date().toLocaleDateString(),
                status: 'Active'
            };

            // Get existing members or start new list
            const members = JSON.parse(localStorage.getItem('members') || '[]');
            members.push(newMember);
            
            // Save back to localStorage
            localStorage.setItem('members', JSON.stringify(members));
            
            alert('Member Registered Successfully!');
            this.reset();
            window.location.href = 'MONITOR.html'; // Talk to the other page
        });
    </script>
</body>
</html>
